syntax = "proto3";

package community;

option go_package = "github.com/pawfiler/backend/services/community/pb";

service CommunityService {
  // 게시글 관리
  rpc GetFeed(GetFeedRequest) returns (FeedResponse);
  rpc GetPost(GetPostRequest) returns (Post);
  rpc CreatePost(CreatePostRequest) returns (Post);
  rpc UpdatePost(UpdatePostRequest) returns (Post);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  
  // 댓글 관리
  rpc GetComments(GetCommentsRequest) returns (CommentsResponse);
  rpc CreateComment(CreateCommentRequest) returns (Comment);
  rpc DeleteComment(DeleteCommentRequest) returns (DeleteCommentResponse);
  
  // 좋아요 관리
  rpc LikePost(LikePostRequest) returns (LikePostResponse);
  rpc UnlikePost(UnlikePostRequest) returns (UnlikePostResponse);
  rpc CheckLike(CheckLikeRequest) returns (CheckLikeResponse);
  
  // 투표 관리
  rpc VotePost(VotePostRequest) returns (VotePostResponse);
  rpc GetVoteResult(GetVoteResultRequest) returns (VoteResult);
  rpc GetUserVote(GetUserVoteRequest) returns (GetUserVoteResponse);

  // 미디어 업로드 (영상, 이미지)
  rpc UploadMedia(UploadMediaRequest) returns (UploadMediaResponse);

  // 대시보드 API
  rpc GetNotices(GetNoticesRequest) returns (NoticesResponse);
  rpc GetTopDetective(GetTopDetectiveRequest) returns (TopDetectiveResponse);
  rpc GetHotTopic(GetHotTopicRequest) returns (HotTopicResponse);
}

message CreatePostRequest {
  string user_id = 1;
  string author_nickname = 2;
  string author_emoji = 3;
  string title = 4;
  string body = 5;
  repeated string tags = 6;
  string media_url = 7;
  string media_type = 8;
  bool is_admin_post = 9;
  optional bool is_correct = 10;
}

message Post {
  string id = 1;
  string author_id = 2;
  string author_nickname = 3;
  string author_emoji = 4;
  string title = 5;
  string body = 6;
  int32 likes = 7;
  int32 comments = 8;
  string created_at = 9;
  repeated string tags = 10;
  string media_url = 11;
  string media_type = 12;
  bool is_admin_post = 13;
  int32 true_votes = 14;
  int32 false_votes = 15;
  optional bool is_correct = 16;
}

message GetFeedRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search_query = 3;
  string search_type = 4; // "title", "body", "all"
}

message FeedResponse {
  repeated Post posts = 1;
  int32 total_count = 2;
  int32 page = 3;
}

message GetPostRequest {
  string post_id = 1;
}

message LikePostRequest {
  string post_id = 1;
  string user_id = 2;
}

message LikePostResponse {
  bool success = 1;
  bool already_liked = 2;
}

message Comment {
  string id = 1;
  string post_id = 2;
  string author_id = 3;
  string author_nickname = 4;
  string author_emoji = 5;
  string body = 6;
  string created_at = 7;
}

message GetCommentsRequest {
  string post_id = 1;
}

message CommentsResponse {
  repeated Comment comments = 1;
}

// UpdatePost
message UpdatePostRequest {
  string post_id = 1;
  string user_id = 2;
  string title = 3;
  string body = 4;
  repeated string tags = 5;
}

// DeletePost
message DeletePostRequest {
  string post_id = 1;
  string user_id = 2;
}

message DeletePostResponse {
  bool success = 1;
}

// CreateComment
message CreateCommentRequest {
  string post_id = 1;
  string user_id = 2;
  string author_nickname = 3;
  string author_emoji = 4;
  string body = 5;
}

// DeleteComment
message DeleteCommentRequest {
  string comment_id = 1;
  string user_id = 2;
}

message DeleteCommentResponse {
  bool success = 1;
}

// UnlikePost
message UnlikePostRequest {
  string post_id = 1;
  string user_id = 2;
}

message UnlikePostResponse {
  bool success = 1;
}

// CheckLike
message CheckLikeRequest {
  string post_id = 1;
  string user_id = 2;
}

message CheckLikeResponse {
  bool liked = 1;
}

// GetNotices
message GetNoticesRequest {}

message Notice {
  string id = 1;
  string title = 2;
}

message NoticesResponse {
  repeated Notice notices = 1;
}

// GetTopDetective
message GetTopDetectiveRequest {}

message TopDetectiveResponse {
  string author_nickname = 1;
  string author_emoji = 2;
  int32 total_likes = 3;
}

// GetHotTopic
message GetHotTopicRequest {}

message HotTopicResponse {
  string tag = 1;
  int32 count = 2;
}

// VotePost
message VotePostRequest {
  string post_id = 1;
  string user_id = 2;
  bool vote = 3;
}

message VotePostResponse {
  bool success = 1;
  bool already_voted = 2;
  int32 xp_earned = 3;
}

message GetVoteResultRequest {
  string post_id = 1;
}

message VoteResult {
  string post_id = 1;
  int32 true_votes = 2;
  int32 false_votes = 3;
}

message GetUserVoteRequest {
  string post_id = 1;
  string user_id = 2;
}

message GetUserVoteResponse {
  bool voted = 1;
  bool vote = 2;
}

// UploadMedia
message UploadMediaRequest {
  string file_name = 1;
}

message UploadMediaResponse {
  string media_url = 1;
}
