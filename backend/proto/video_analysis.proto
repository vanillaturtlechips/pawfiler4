syntax = "proto3";

package video_analysis;

option go_package = "github.com/pawfiler/backend/services/video-analysis/pb";

service VideoAnalysisService {
  rpc AnalyzeVideo(AnalyzeVideoRequest) returns (AnalyzeVideoResponse);
  rpc GetUploadUrl(GetUploadUrlRequest) returns (GetUploadUrlResponse);
  rpc UploadVideo(stream UploadVideoRequest) returns (UploadVideoResponse);
  rpc GetAnalysisStatus(GetAnalysisStatusRequest) returns (AnalysisStatus);
  rpc GetAnalysisResult(GetAnalysisResultRequest) returns (DeepfakeReport);
  rpc GetUnifiedResult(GetAnalysisResultRequest) returns (UnifiedReport);
}

message GetUploadUrlRequest {
  string user_id = 1;
  string filename = 2;
}

message GetUploadUrlResponse {
  string upload_url = 1;
  string video_url = 2;
}

message AnalyzeVideoRequest {
  string video_url = 1;
  string user_id = 2;
}

message AnalyzeVideoResponse {
  string task_id = 1;
  string verdict = 2;
  double confidence_score = 3;
  string message = 4;
}

message UploadVideoRequest {
  oneof data {
    VideoMetadata metadata = 1;
    bytes chunk = 2;
  }
}

message VideoMetadata {
  string user_id = 1;
  string filename = 2;
  int64 file_size = 3;
}

message UploadVideoResponse {
  string task_id = 1;
  string message = 2;
}

message GetAnalysisStatusRequest {
  string task_id = 1;
}

message AnalysisStatus {
  string task_id = 1;
  string stage = 2;
  repeated LogEntry logs = 3;
}

message LogEntry {
  string timestamp = 1;
  string message = 2;
  string type = 3;
}

message GetAnalysisResultRequest {
  string task_id = 1;
}

message DeepfakeReport {
  string task_id = 1;
  string verdict = 2;
  double confidence_score = 3;
  repeated ManipulatedRegion manipulated_regions = 4;
  int32 frame_samples_analyzed = 5;
  string model_version = 6;
  int32 processing_time_ms = 7;
}

message ManipulatedRegion {
  string label = 1;
  double confidence = 2;
}

// Unified Report (멀티모달 통합)
message UnifiedReport {
  string task_id = 1;
  string final_verdict = 2;  // REAL / FAKE / UNCERTAIN
  double confidence = 3;
  
  VisualAnalysis visual = 4;
  AudioAnalysis audio = 5;
  SyncAnalysis lipsync = 6;
  
  repeated string warnings = 7;
  int32 total_processing_time_ms = 8;
}

message VisualAnalysis {
  string verdict = 1;
  double confidence = 2;
  AIModelPrediction ai_model = 3;
  repeated FrameScore frames = 4;
  int32 frames_analyzed = 5;
}

message AIModelPrediction {
  string model_name = 1;
  double confidence = 2;
  repeated ModelScore candidates = 3;
}

message ModelScore {
  string name = 1;
  double score = 2;
}

message FrameScore {
  int32 frame_number = 1;
  double deepfake_score = 2;
  int32 timestamp_ms = 3;
}

message AudioAnalysis {
  bool is_synthetic = 1;
  double confidence = 2;
  string method = 3;  // "Real Voice" / "TTS" / "Voice Clone"
  repeated AudioSegment segments = 4;
}

message AudioSegment {
  int32 start_ms = 1;
  int32 end_ms = 2;
  double synthetic_score = 3;
}

message SyncAnalysis {
  bool is_synced = 1;
  double confidence = 2;
  repeated TimeRange mismatched_segments = 3;
}

message TimeRange {
  int32 start_ms = 1;
  int32 end_ms = 2;
}
