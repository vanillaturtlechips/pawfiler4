syntax = "proto3";

package quiz;

import "google/api/annotations.proto";

option go_package = "github.com/pawfiler/backend/services/quiz/proto";

service QuizService {
  rpc GetRandomQuestion(GetRandomQuestionRequest) returns (QuizQuestion) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetRandomQuestion"
      body: "*"
    };
  }
  rpc SubmitAnswer(SubmitAnswerRequest) returns (SubmitAnswerResponse) {
    option (google.api.http) = {
      post: "/quiz.QuizService/SubmitAnswer"
      body: "*"
    };
  }
  rpc GetUserStats(GetUserStatsRequest) returns (QuizStats) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetUserStats"
      body: "*"
    };
  }
  rpc GetQuestionById(GetQuestionByIdRequest) returns (QuizQuestion) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetQuestionById"
      body: "*"
    };
  }
  rpc GetUserProfile(GetUserProfileRequest) returns (UserProfile) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetUserProfile"
      body: "*"
    };
  }
  rpc UpdateUserProfile(UpdateUserProfileRequest) returns (UserProfile) {
    option (google.api.http) = {
      post: "/quiz.QuizService/UpdateUserProfile"
      body: "*"
    };
  }
  rpc GetRanking(GetRankingRequest) returns (GetRankingResponse) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetRanking"
      body: "*"
    };
  }
  rpc GetQuestionStats(GetQuestionStatsRequest) returns (GetQuestionStatsResponse) {
    option (google.api.http) = {
      post: "/quiz.QuizService/GetQuestionStats"
      body: "*"
    };
  }
}

enum QuestionType {
  MULTIPLE_CHOICE = 0;
  TRUE_FALSE = 1;
  REGION_SELECT = 2;
  COMPARISON = 3;
}

enum MediaType {
  VIDEO = 0;
  IMAGE = 1;
}

message GetRandomQuestionRequest {
  string user_id = 1;
  optional string difficulty = 2;
  optional QuestionType type = 3;
}

message GetQuestionByIdRequest {
  string question_id = 1;
}

message QuizQuestion {
  string id = 1;
  QuestionType type = 2;
  MediaType media_type = 3;
  string media_url = 4;
  string thumbnail_emoji = 5;
  string difficulty = 6;
  string category = 7;
  string explanation = 8;
  repeated string options = 10;
  optional int32 correct_index = 11;
  optional bool correct_answer = 12;
  repeated Region correct_regions = 13;
  optional int32 tolerance = 14;
  optional string comparison_media_url = 15;
  optional string correct_side = 16;
}

message Region {
  float x = 1;
  float y = 2;
  float radius = 3;
}

message SubmitAnswerRequest {
  string user_id = 1;
  string question_id = 2;
  optional int32 selected_index = 3;
  optional bool selected_answer = 4;
  optional Point selected_region = 5;
  optional string selected_side = 6;
}

message Point {
  float x = 1;
  float y = 2;
}

message SubmitAnswerResponse {
  bool correct = 1;
  int32 xp_earned = 2;
  int32 coins_earned = 3;
  string explanation = 4;
  int32 streak_count = 5;
  optional int32 correct_index = 6;
  // 게임화 필드
  int32 streak_bonus = 7;
  bool tier_promoted = 8;
  int32 level = 9;
  string tier_name = 10;
  int32 total_exp = 11;
  int32 total_coins = 12;
  int32 energy = 13;
  int32 max_energy = 14;
}

message GetUserStatsRequest {
  string user_id = 1;
}

message QuizStats {
  int32 total_answered = 1;
  double correct_rate = 2;
  int32 current_streak = 3;
  int32 best_streak = 4;
  int32 lives = 5;
}

message GetUserProfileRequest {
  string user_id = 1;
}

message UpdateUserProfileRequest {
  string user_id = 1;
  optional string nickname = 2;
  optional string avatar_emoji = 3;
}

message UserProfile {
  string user_id = 1;
  int32 energy = 2;
  int32 max_energy = 3;
  int32 level = 4;
  string tier_name = 5;
  int32 total_exp = 6;
  int32 total_coins = 7;
  optional string nickname = 8;
  optional string avatar_emoji = 9;
}

message GetRankingRequest {
  string sort_by = 1;
  int32 limit = 2;
}

message RankingEntry {
  int32 rank = 1;
  string user_id = 2;
  string nickname = 3;
  string avatar_emoji = 4;
  string tier = 5;
  int32 level = 6;
  int32 total_exp = 7;
  int32 total_coins = 8;
  int32 total_answered = 9;
  int32 correct_count = 10;
  double accuracy = 11;
}

message GetRankingResponse {
  repeated RankingEntry entries = 1;
}

message GetQuestionStatsRequest {
  optional string question_id = 1;
}

message QuestionStat {
  string id = 1;
  double accuracy = 2;
  int32 total_attempts = 3;
}

message GetQuestionStatsResponse {
  repeated QuestionStat stats = 1;
}
