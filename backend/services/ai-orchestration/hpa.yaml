# =================================================================
# HPA — 트래픽 없으면 0으로 스케일 다운
# =================================================================
# 사용법:
#   개발: kubectl apply -f hpa.yaml
#   프로덕션: 이 파일 삭제 또는 미적용 (항상 1개 유지)
# =================================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: pawfiler-serve-hpa
  namespace: pawfiler
spec:
  scaleTargetRef:
    apiVersion: ray.io/v1
    kind: RayService
    name: pawfiler-serve
  minReplicas: 0  # 트래픽 없으면 완전 종료
  maxReplicas: 2
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5분간 트래픽 없으면 스케일 다운
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0  # 즉시 스케일 업
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
  metrics:
    - type: Pods
      pods:
        metric:
          name: ray_serve_num_ongoing_requests
        target:
          type: AverageValue
          averageValue: "10"  # Pod당 평균 10개 요청 이상이면 스케일 업
