apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: pawfiler

resources:
  - ../../rayservice.yaml
  # HPA 제외 - 프로덕션은 항상 최소 1개 유지

patches:
  - patch: |-
      - op: replace
        path: /spec/rayClusterConfig/workerGroupSpecs/0/replicas
        value: 1  # 프로덕션: 항상 최소 1개
    target:
      kind: RayService
      name: pawfiler-serve
