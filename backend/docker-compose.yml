version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pawfiler-postgres
    environment:
      POSTGRES_USER: pawfiler
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pawfiler
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawfiler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawfiler-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pawfiler-redis
    ports:
      - "6380:6379"
    networks:
      - pawfiler-network

  # Quiz Service
  quiz-service:
    build:
      context: ./services/quiz
      dockerfile: Dockerfile
    container_name: pawfiler-quiz
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      GRPC_PORT: "50052"
      HTTP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
      CORS_ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177"
    ports:
      - "50052:50052"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pawfiler-network

  # Community Service
  community-service:
    build:
      context: ./services/community
      dockerfile: Dockerfile
    container_name: pawfiler-community
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      HTTP_PORT: "8081"
      AWS_REGION: ap-northeast-2
      S3_COMMUNITY_BUCKET: pawfiler-community-media
      CLOUDFRONT_COMMUNITY_DOMAIN: localhost:4566
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      CORS_ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177"
    ports:
      - "50053:50053"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # User Service (Profile + Shop)
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: pawfiler-user
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      HTTP_PORT: "8083"
      CORS_ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Admin Service
  admin-service:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    container_name: pawfiler-admin
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pawfiler
      DB_PASSWORD: dev_password
      DB_NAME: pawfiler
      DB_SSLMODE: disable
      PORT: "8082"
      AWS_REGION: ap-northeast-2
      S3_BUCKET: pawfiler-quiz-media
      CLOUDFRONT_DOMAIN: localhost:4566
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Report Service (개인별 PDF 리포트 생성)
  report-service:
    build:
      context: ./services/report
      dockerfile: Dockerfile
    container_name: pawfiler-report
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
    ports:
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Auth Service
  auth-service:
    build:
      context: ./services/auth
      dockerfile: Dockerfile
    container_name: pawfiler-auth
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      JWT_SECRET: local_dev_secret
      PORT: "8084"
      USER_SERVICE_URL: http://user-service:8083
      CORS_ALLOWED_ORIGINS: "http://localhost:5174,http://localhost:5175,http://localhost:5176,http://localhost:5177"
      REDIS_ADDR: "redis:6379"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # MinIO (S3 로컬 대체 - 계정 불필요)
  minio:
    image: minio/minio:latest
    container_name: pawfiler-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: test
      MINIO_ROOT_PASSWORD: testtest
    ports:
      - "4566:9000"
      - "9001:9001"
    networks:
      - pawfiler-network

  # Video Analysis Service
  video-analysis:
    build:
      context: ./services/video-analysis
      dockerfile: Dockerfile
    container_name: pawfiler-video-analysis
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      REDIS_URL: redis://redis:6379
      S3_BUCKET: pawfiler-videos
      AWS_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: testtest
      AWS_DEFAULT_REGION: ap-northeast-2
      AI_ORCHESTRATION_URL: http://ai-orchestration:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "50054:50054"
      - "8085:8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - pawfiler-network

  # AI Orchestration (Ray Serve)
  ai-orchestration:
    build:
      context: ./services/ai-orchestration
      dockerfile: Dockerfile.local
      pull: false
    container_name: pawfiler-ai-orchestration
    environment:
      MODEL_DIR: /app/efs_models
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: testtest
      AWS_DEFAULT_REGION: ap-northeast-2
      AWS_ENDPOINT_URL: http://minio:9000
      RAY_ADDRESS: local
      SERVE_HTTP_HOST: 0.0.0.0
      UPSTAGE_API_KEY: up_ShFVrqDbFnuuMc4eGzc10su7Pu6dv
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    networks:
      - pawfiler-network

  # Proto Descriptor Generator
  proto-generator:
    image: namely/protoc:1.51_1
    container_name: pawfiler-proto-generator
    volumes:
      - ./proto:/proto
    working_dir: /proto
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rm -rf /proto/proto.pb && \
        protoc --include_imports --include_source_info \
          --descriptor_set_out=/proto/proto.pb \
          --proto_path=/proto \
          /proto/*.proto && \
        echo 'Proto descriptor generated successfully'
    networks:
      - pawfiler-network



  ollama:
    image: ollama/ollama:latest
    container_name: pawfiler-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pawfiler-network

volumes:
  postgres_data:
  ollama_data:

networks:
  pawfiler-network:
    driver: bridge
