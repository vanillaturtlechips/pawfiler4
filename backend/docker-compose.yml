version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pawfiler-postgres
    environment:
      POSTGRES_USER: pawfiler
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pawfiler
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawfiler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawfiler-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pawfiler-redis
    ports:
      - "6379:6379"
    networks:
      - pawfiler-network

  # Quiz Service
  quiz-service:
    build:
      context: ./services/quiz
      dockerfile: Dockerfile
    container_name: pawfiler-quiz
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      GRPC_PORT: "50052"
      HTTP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
    ports:
      - "50052:50052"
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - pawfiler-network

  # Community Service
  community-service:
    build:
      context: ./services/community
      dockerfile: Dockerfile
    container_name: pawfiler-community
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      HTTP_PORT: "8081"
    ports:
      - "50053:50053"
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # User Service (Profile + Shop)
  user-service:
    build:
      context: ./services/user
      dockerfile: Dockerfile
    container_name: pawfiler-user
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      HTTP_PORT: "8083"
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Admin Service
  admin-service:
    build:
      context: ./services/admin
      dockerfile: Dockerfile
    container_name: pawfiler-admin
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: pawfiler
      DB_PASSWORD: dev_password
      DB_NAME: pawfiler
      DB_SSLMODE: disable
      PORT: "8082"
      AWS_REGION: ap-northeast-2
      S3_BUCKET: pawfiler-quiz-media
      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN}
    volumes:
      - ~/.aws:/root/.aws:ro
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Proto Descriptor Generator
  proto-generator:
    image: namely/protoc:1.51_1
    container_name: pawfiler-proto-generator
    volumes:
      - ./proto:/proto
    working_dir: /proto
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        rm -rf /proto/proto.pb && \
        protoc --include_imports --include_source_info \
          --descriptor_set_out=/proto/proto.pb \
          --proto_path=/proto \
          /proto/*.proto && \
        echo 'Proto descriptor generated successfully'
    networks:
      - pawfiler-network

#   # Envoy Gateway (gRPC-JSON transcoding) - removed in PR #80, services use direct HTTP ports
#   envoy:
#     ...

volumes:
  postgres_data:

networks:
  pawfiler-network:
    driver: bridge
