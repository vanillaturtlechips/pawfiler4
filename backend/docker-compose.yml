version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: pawfiler-postgres
    environment:
      POSTGRES_USER: pawfiler
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: pawfiler
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawfiler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pawfiler-network

  # Quiz Service
  quiz-service:
    build:
      context: ./services/quiz
      dockerfile: Dockerfile
    container_name: pawfiler-quiz
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
      GRPC_PORT: "50052"
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Quiz Proxy (gRPC to REST)
  quiz-proxy:
    build:
      context: .
      dockerfile: ./quiz-proxy/Dockerfile
    container_name: pawfiler-quiz-proxy
    environment:
      QUIZ_SERVICE_URL: quiz-service:50052
    ports:
      - "3001:3001"
    depends_on:
      - quiz-service
    networks:
      - pawfiler-network

  # Community Service
  community-service:
    build:
      context: ./services/community
      dockerfile: Dockerfile
    container_name: pawfiler-community
    environment:
      DATABASE_URL: postgres://pawfiler:dev_password@postgres:5432/pawfiler?sslmode=disable
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pawfiler-network

  # Envoy Proxy (gRPC-Web)
  envoy:
    image: envoyproxy/envoy:v1.28-latest
    container_name: pawfiler-envoy
    ports:
      - "8080:8080"
      - "9901:9901"
    volumes:
      - ./envoy/envoy.yaml:/etc/envoy/envoy.yaml
    command: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml
    depends_on:
      - quiz-service
      - community-service
    networks:
      - pawfiler-network

volumes:
  postgres_data:

networks:
  pawfiler-network:
    driver: bridge
