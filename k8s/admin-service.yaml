apiVersion: v1
kind: Namespace
metadata:
  name: admin
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-sa
  namespace: admin
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::009946608368:role/pawfiler-admin-service-role
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      serviceAccountName: admin-sa
      containers:
      - name: admin-service
        image: 009946608368.dkr.ecr.ap-northeast-2.amazonaws.com/pawfiler/admin-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: DB_HOST
          value: "pawfiler-db-instance.c9osquca0esm.ap-northeast-2.rds.amazonaws.com"
        - name: DB_PORT
          value: "5432"
        - name: DB_USER
          value: "pawfiler"
        - name: DB_PASSWORD
          value: "testpass123"
        - name: DB_NAME
          value: "pawfiler_db"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: admin
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: admin-service
  ports:
  - port: 80
    targetPort: 8082
    protocol: TCP
