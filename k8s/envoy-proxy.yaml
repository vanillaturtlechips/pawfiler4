---
apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: pawfiler
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 9901
    static_resources:
      listeners:
      - name: main_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 8080
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/quiz.QuizService"
                    route:
                      cluster: quiz_service
                      timeout: 30s
                  - match:
                      prefix: "/community.CommunityService"
                    route:
                      cluster: community_service
                      timeout: 30s
                  cors:
                    allow_origin_string_match:
                    - safe_regex:
                        regex: ".*"
                    allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                    allow_headers: "authorization, content-type, x-request-id, grpc-timeout"
                    expose_headers: "x-request-id, grpc-status, grpc-message"
                    max_age: "86400"
              http_filters:
              - name: envoy.filters.http.lua
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.lua.v3.Lua
                  inline_code: |
                    function envoy_on_request(request_handle)
                      local path = request_handle:headers():get(":path")
                      if path and string.sub(path, 1, 5) == "/api/" then
                        request_handle:headers():replace(":path", string.sub(path, 5))
                      end
                    end
              - name: envoy.filters.http.grpc_json_transcoder
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                  proto_descriptor: "/etc/envoy/proto.pb"
                  services:
                    - "quiz.QuizService"
                    - "community.CommunityService"
                  print_options:
                    add_whitespace: false
                    always_print_primitive_fields: true
                    preserve_proto_field_names: false
                  auto_mapping: true
                  convert_grpc_status: true
                  match_incoming_request_route: false
              - name: envoy.filters.http.cors
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
      clusters:
      - name: quiz_service
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: quiz_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: quiz-service
                    port_value: 50052
      - name: community_service
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: community_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: community-service
                    port_value: 50053
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy-proxy
  namespace: pawfiler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: envoy-proxy
  template:
    metadata:
      labels:
        app: envoy-proxy
    spec:
      containers:
      - name: envoy
        image: envoyproxy/envoy:v1.28-latest
        ports:
        - containerPort: 8080
          name: http
        - containerPort: 9901
          name: admin
        volumeMounts:
        - name: config
          mountPath: /etc/envoy
          readOnly: true
        command: ["/usr/local/bin/envoy"]
        args: ["-c", "/etc/envoy/envoy.yaml"]
      volumes:
      - name: config
        projected:
          sources:
          - configMap:
              name: envoy-config
          - configMap:
              name: proto-descriptor
---
apiVersion: v1
kind: Service
metadata:
  name: envoy-proxy
  namespace: pawfiler
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: external
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: ip
spec:
  type: LoadBalancer
  selector:
    app: envoy-proxy
  ports:
  - name: http
    port: 80
    targetPort: 8080
  - name: admin
    port: 9901
    targetPort: 9901
