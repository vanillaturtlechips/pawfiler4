# 배포 테스트용 - 실제 값으로 교체 후 적용
# kubectl apply -f k8s/db-secret.yaml
# 운영에서는 ArgoCD Vault Plugin 또는 AWS Secrets Manager 사용
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: pawfiler
type: Opaque
stringData:
  host: "REPLACE_WITH_RDS_ENDPOINT"
  username: "pawfiler"
  password: "REPLACE_WITH_DB_PASSWORD"
