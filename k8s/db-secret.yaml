# DB Secret 설정
# 실제 값으로 교체 후 적용: kubectl apply -f k8s/db-secret.yaml
# 
# RDS 엔드포인트 확인:
#   cd terraform && terraform output rds_instance_endpoint
#
# 운영 환경에서는 AWS Secrets Manager 또는 External Secrets Operator 사용 권장
apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: pawfiler
type: Opaque
stringData:
  host: "<RDS_ENDPOINT>"  # 예: pawfiler-db-instance.xxx.ap-northeast-2.rds.amazonaws.com
  username: "<DB_USERNAME>"
  password: "<DB_PASSWORD>"
  database_url: "postgres://<DB_USERNAME>:<DB_PASSWORD>@<RDS_ENDPOINT>:5432/pawfiler_db?sslmode=require"
