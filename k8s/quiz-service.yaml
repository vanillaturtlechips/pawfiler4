---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: quiz-service
  namespace: pawfiler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quiz-service
  template:
    metadata:
      labels:
        app: quiz-service
    spec:
      containers:
      - name: quiz-service
        image: 009946608368.dkr.ecr.ap-northeast-2.amazonaws.com/pawfiler/quiz-service:latest
        ports:
        - containerPort: 50052
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: pawfiler_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        readinessProbe:
          tcpSocket:
            port: 50052
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 50052
          initialDelaySeconds: 30
          periodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: quiz-service
  namespace: pawfiler
spec:
  selector:
    app: quiz-service
  ports:
  - port: 50052
    targetPort: 50052
