---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      containers:
      - name: admin-service
        image: 009946608368.dkr.ecr.ap-northeast-2.amazonaws.com/pawfiler/admin-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: pawfiler_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: admin
spec:
  type: ClusterIP
  selector:
    app: admin-service
  ports:
  - port: 8082
    targetPort: 8082
