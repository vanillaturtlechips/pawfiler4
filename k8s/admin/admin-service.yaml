---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-service
  namespace: admin
  annotations:
    eks.amazonaws.com/role-arn: <ADMIN_SERVICE_ROLE_ARN>  # terraform output에서 확인

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-service
  namespace: admin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-service
  template:
    metadata:
      labels:
        app: admin-service
    spec:
      serviceAccountName: admin-service
      containers:
      - name: admin-service
        image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-northeast-2.amazonaws.com/pawfiler/admin-service:latest
        ports:
        - containerPort: 8082
        env:
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
        - name: DB_PORT
          value: "5432"
        - name: DB_NAME
          value: pawfiler_db
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password
        - name: AWS_REGION
          value: "ap-northeast-2"
        - name: S3_BUCKET
          value: "pawfiler-quiz-media"
        - name: CLOUDFRONT_DOMAIN
          value: "<QUIZ_MEDIA_CLOUDFRONT_DOMAIN>"  # terraform output에서 확인
        readinessProbe:
          httpGet:
            path: /health
            port: 8082
          initialDelaySeconds: 10
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: admin-service
  namespace: admin
spec:
  type: LoadBalancer
  selector:
    app: admin-service
  ports:
  - port: 8082
    targetPort: 8082
