apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.k8s.aws/instance-category
          operator: In
          values: ["t", "m", "c"]
        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["2"]
        - key: karpenter.k8s.aws/instance-size
          operator: In
          values: ["2xlarge", "4xlarge", "8xlarge"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      expireAfter: 720h
  limits:
    cpu: "20"
    memory: "40Gi"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2@latest
  role: pawfiler-karpenter-node
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: pawfiler-eks-cluster
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: pawfiler-eks-cluster
  tags:
    karpenter.sh/discovery: pawfiler-eks-cluster
    Name: karpenter-node
