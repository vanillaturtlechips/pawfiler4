apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
      expireAfter: 720h
  limits:
    cpu: "10"
    memory: "20Gi"
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m

---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiSelectorTerms:
    - alias: al2@v1.31
  role: pawfiler-karpenter-node
  subnetSelectorTerms:
    - tags:
        Name: "pawfiler-private-subnet-*"
  securityGroupSelectorTerms:
    - tags:
        Name: "pawfiler-eks-cluster-sg"
  tags:
    karpenter.sh/discovery: pawfiler-eks-cluster
    Name: karpenter-node
