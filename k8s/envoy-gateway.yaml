---
# GatewayClass - Envoy Gateway 컨트롤러 참조
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller

---
# Gateway - ALB로 외부 노출 (AWS LBC가 프로비저닝)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: pawfiler-gateway
  namespace: pawfiler
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: external
spec:
  gatewayClassName: envoy
  listeners:
  - name: http
    protocol: HTTP
    port: 80

---
# HTTPRoute - Quiz Service (gRPC)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: quiz-route
  namespace: pawfiler
spec:
  parentRefs:
  - name: pawfiler-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /quiz.QuizService
    backendRefs:
    - name: quiz-service
      port: 50052

---
# HTTPRoute - Community Service (gRPC)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: community-route
  namespace: pawfiler
spec:
  parentRefs:
  - name: pawfiler-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /community.CommunityService
    backendRefs:
    - name: community-service
      port: 50053

---
# HTTPRoute - Admin Service (REST)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: admin-route
  namespace: pawfiler
spec:
  parentRefs:
  - name: pawfiler-gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /admin
    backendRefs:
    - name: admin-service
      port: 8082
