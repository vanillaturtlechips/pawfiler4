apiVersion: apps/v1
kind: Deployment
metadata:
  name: envoy
  namespace: {{ .Values.global.namespace }}
  labels:
    app: envoy
spec:
  replicas: {{ .Values.envoy.replicas }}
  selector:
    matchLabels:
      app: envoy
  template:
    metadata:
      labels:
        app: envoy
    spec:
      serviceAccountName: envoy-sa
      initContainers:
        - name: fetch-proto
          image: amazon/aws-cli:latest
          command:
            - aws
            - s3
            - cp
            - {{ .Values.envoy.protoPbS3Path }}
            - /etc/envoy/proto.pb
          volumeMounts:
            - name: proto-volume
              mountPath: /etc/envoy
      containers:
        - name: envoy
          image: {{ .Values.envoy.image }}
          args:
            - -c
            - /etc/envoy/envoy.yaml
          ports:
            - name: http
              containerPort: {{ .Values.envoy.port }}
            - name: admin
              containerPort: {{ .Values.envoy.adminPort }}
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
            - name: proto-volume
              mountPath: /etc/envoy/proto.pb
              subPath: proto.pb
          resources:
            {{- toYaml .Values.envoy.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.envoy.adminPort }}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /server_info
              port: {{ .Values.envoy.adminPort }}
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: envoy-config
          configMap:
            name: envoy-config
        - name: proto-volume
          emptyDir: {}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: envoy-sa
  namespace: {{ .Values.global.namespace }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.envoy.irsaRoleArn }}
---
apiVersion: v1
kind: Service
metadata:
  name: envoy
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: envoy
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.envoy.port }}
      targetPort: {{ .Values.envoy.port }}
  type: ClusterIP
