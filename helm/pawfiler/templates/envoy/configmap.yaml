apiVersion: v1
kind: ConfigMap
metadata:
  name: envoy-config
  namespace: {{ .Values.global.namespace }}
data:
  envoy.yaml: |
    admin:
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{ .Values.envoy.adminPort }}

    static_resources:
      listeners:
      - name: main_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: {{ .Values.envoy.port }}
        filter_chains:
        - filters:
          - name: envoy.filters.network.http_connection_manager
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
              stat_prefix: ingress_http
              codec_type: AUTO
              route_config:
                name: local_route
                virtual_hosts:
                - name: backend
                  domains: ["*"]
                  routes:
                  - match:
                      prefix: "/quiz.QuizService"
                    route:
                      cluster: quiz_service
                      timeout: 30s
                  - match:
                      prefix: "/community.CommunityService"
                    route:
                      cluster: community_service
                      timeout: 30s
                  - match:
                      prefix: "/admin"
                    route:
                      cluster: admin_service
                      timeout: 30s
                  cors:
                    allow_origin_string_match:
                    - safe_regex:
                        regex: ".*"
                    allow_methods: "GET, POST, PUT, DELETE, OPTIONS"
                    allow_headers: "authorization, content-type, x-request-id, grpc-timeout"
                    expose_headers: "x-request-id, grpc-status, grpc-message"
                    max_age: "86400"
              http_filters:
              - name: envoy.filters.http.grpc_json_transcoder
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.grpc_json_transcoder.v3.GrpcJsonTranscoder
                  proto_descriptor: "/etc/envoy/proto.pb"
                  services:
                    - "quiz.QuizService"
                    - "community.CommunityService"
                  print_options:
                    add_whitespace: false
                    always_print_primitive_fields: true
                    preserve_proto_field_names: false
                  auto_mapping: true
                  convert_grpc_status: true
              - name: envoy.filters.http.cors
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.cors.v3.Cors
              - name: envoy.filters.http.router
                typed_config:
                  "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

      clusters:
      - name: quiz_service
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: quiz_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: quiz-service
                    port_value: {{ .Values.quizService.port }}

      - name: community_service
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        typed_extension_protocol_options:
          envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
            "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
            explicit_http_config:
              http2_protocol_options: {}
        load_assignment:
          cluster_name: community_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: community-service
                    port_value: {{ .Values.communityService.port }}

      - name: admin_service
        connect_timeout: 5s
        type: STRICT_DNS
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: admin_service
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: admin-service
                    port_value: {{ .Values.adminService.port }}
