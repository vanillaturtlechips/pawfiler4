apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pawfiler-route
  namespace: {{ .Values.global.namespace }}
spec:
  parentRefs:
    - name: pawfiler-gateway
      namespace: {{ .Values.global.namespace }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /quiz.QuizService
      backendRefs:
        - name: envoy
          port: {{ .Values.envoy.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /community.CommunityService
      backendRefs:
        - name: envoy
          port: {{ .Values.envoy.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /admin
      backendRefs:
        - name: envoy
          port: {{ .Values.envoy.port }}
