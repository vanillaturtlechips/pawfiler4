name: PawFiler CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  # ── 1. 변경 감지 ──────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin_frontend: ${{ steps.filter.outputs.admin_frontend }}
      report: ${{ steps.filter.outputs.report }}
      has_backend: ${{ steps.check.outputs.has_backend }}
    steps:
      - uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            quiz:            'backend/services/quiz/**'
            community:       'backend/services/community/**'
            admin:           'backend/services/admin/**'
            video-analysis:  'backend/services/video-analysis/**'
            user:            'backend/services/user/**'
            auth:            'backend/services/auth/**'
            frontend:        'frontend/**'
            admin_frontend:  'admin-frontend/**'
            report:          'backend/services/report/**'
            chat-bot:        'backend/services/chat-bot/**'

      - name: Check backend changes
        id: check
        run: |
          SERVICES='${{ steps.filter.outputs.changes }}'
          HAS=$(echo "$SERVICES" | jq '[.[] | select(. != "frontend" and . != "admin_frontend" and . != "report")] | length > 0')
          echo "has_backend=$HAS" >> $GITHUB_OUTPUT

  # ── 2. 백엔드 빌드 & ECR 푸시 (순차) ─────────────────────────────
  build-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_backend == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push changed services (sequential)
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          BACKEND=$(echo "$SERVICES" | jq -r '.[] | select(. != "frontend" and . != "admin_frontend" and . != "report")')

          for SERVICE in $BACKEND; do
            echo "▶ Building $SERVICE"
            docker build \
              -t "$REGISTRY/pawfiler/${SERVICE}-service:$SHA" \
              -t "$REGISTRY/pawfiler/${SERVICE}-service:latest" \
              ./backend/services/$SERVICE
            docker push "$REGISTRY/pawfiler/${SERVICE}-service:$SHA"
            docker push "$REGISTRY/pawfiler/${SERVICE}-service:latest"
            echo "✔ $SERVICE pushed"
          done

  # ── 3. ArgoCD 이미지 태그 업데이트 ───────────────────────────────
  update-argocd:
    needs: [detect-changes, build-backend]
    if: needs.detect-changes.outputs.has_backend == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: vanillaturtlechips/pawfiler4-argocd
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}

      - name: Update image tags
        env:
          REGISTRY: ${{ secrets.ECR_REGISTRY }}
          SHA: ${{ github.sha }}
        run: |
          SERVICES='${{ needs.detect-changes.outputs.services }}'
          BACKEND=$(echo "$SERVICES" | jq -r '.[] | select(. != "frontend" and . != "admin_frontend" and . != "report")')

          for SERVICE in $BACKEND; do
            FILE="apps/services/${SERVICE}/deployment.yaml"
            [ -f "$FILE" ] && sed -i \
              "s|image: .*/pawfiler/${SERVICE}-service:.*|image: $REGISTRY/pawfiler/${SERVICE}-service:$SHA|g" \
              "$FILE"
          done

      - name: Commit & Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push

  # ── 4. 프론트엔드 배포 ────────────────────────────────────────────
  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          VITE_MEDIA_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_MEDIA_CLOUDFRONT_DOMAIN }}
          VITE_USE_MOCK_AUTH: "false"
          VITE_USE_MOCK_API: "false"
          VITE_REPORT_BASE_URL: ${{ secrets.VITE_REPORT_BASE_URL }}
          VITE_AI_AGENT_BASE_URL: ${{ secrets.VITE_AI_AGENT_BASE_URL }}
        run: npm ci && npm run build

      - name: Deploy to S3 & Invalidate CloudFront
        run: |
          aws s3 sync frontend/dist s3://pawfiler-frontend --delete
          aws cloudfront create-invalidation --distribution-id E2ZI7JFQGIUFYC --paths "/*"

  # ── 5. Report Lambda 배포 ─────────────────────────────────────────
  deploy-report:
    needs: detect-changes
    if: needs.detect-changes.outputs.report == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Push & Update Lambda
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          SHA: ${{ github.sha }}
        run: |
          docker build \
            -t "$REGISTRY/pawfiler/report-lambda:$SHA" \
            -t "$REGISTRY/pawfiler/report-lambda:latest" \
            ./backend/services/report
          docker push "$REGISTRY/pawfiler/report-lambda:$SHA"
          docker push "$REGISTRY/pawfiler/report-lambda:latest"
          aws lambda update-function-code \
            --function-name pawfiler-report \
            --image-uri "$REGISTRY/pawfiler/report-lambda:$SHA" \
            --region ap-northeast-2

  # ── 6. 어드민 프론트엔드 배포 ─────────────────────────────────────
  deploy-admin-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin_frontend == 'true' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Build & Deploy
        working-directory: admin-frontend
        env:
          VITE_ADMIN_API_URL: ${{ secrets.VITE_ADMIN_API_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: npm ci && npm run build

      - name: Deploy to S3
        run: aws s3 sync admin-frontend/dist s3://pawfiler-admin-frontend --delete
