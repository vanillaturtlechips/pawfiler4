name: PawFiler CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  id-token: write
  contents: read

jobs:
  # 변경 감지 및 매트릭스 생성
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_services: ${{ steps.set-matrix.outputs.has_services }}
      frontend: ${{ steps.filter.outputs.frontend }}
      admin_frontend: ${{ steps.filter.outputs.admin_frontend }}
    steps:
      - uses: actions/checkout@v4

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            quiz: 'backend/services/quiz/**'
            community: 'backend/services/community/**'
            admin: 'backend/services/admin/**'
            video-analysis: 'backend/services/video-analysis/**'
            user: 'backend/services/user/**'
            auth: 'backend/services/auth/**'
            frontend: 'frontend/**'
            admin_frontend: 'admin-frontend/**'
            report: 'backend/services/report/**'

      - name: Generate Matrix
        id: set-matrix
        run: |
          SERVICES='${{ steps.filter.outputs.changes }}'
          MATRIX=$(echo $SERVICES | jq -c 'map(select(. != "frontend" and . != "admin_frontend" and . != "report")) | map({
            service: .,
            ecr_name: (. + "-service")
          })')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "has_services=$(echo $MATRIX | jq 'length > 0')" >> $GITHUB_OUTPUT

  # Docker 빌드 및 ECR 푸시
  build-and-push:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_services == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/services/${{ matrix.config.service }}
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/pawfiler/${{ matrix.config.ecr_name }}:${{ github.sha }}
            ${{ steps.login-ecr.outputs.registry }}/pawfiler/${{ matrix.config.ecr_name }}:latest

  # ArgoCD 이미지 태그 업데이트
  update-argocd:
    needs: [build-and-push, detect-changes]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: vanillaturtlechips/pawfiler4-argocd
          token: ${{ secrets.ARGOCD_REPO_TOKEN }}

      - name: Update Image Tags
        run: |
          for service in $(echo '${{ needs.detect-changes.outputs.matrix }}' | jq -r '.[].service'); do
            ecr_name="${service}-service"
            sed -i "s|image: .*/pawfiler/${ecr_name}:.*|image: ${{ secrets.ECR_REGISTRY }}/pawfiler/${ecr_name}:${{ github.sha }}|g" \
              apps/services/${service}/deployment.yaml
          done

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Update image tags to ${{ github.sha }}" || exit 0
          git push

  # 프론트엔드 S3 배포
  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build
        working-directory: frontend
        env:
          VITE_MEDIA_CLOUDFRONT_DOMAIN: ${{ secrets.VITE_MEDIA_CLOUDFRONT_DOMAIN }}
          VITE_USE_MOCK_AUTH: "false"
          VITE_USE_MOCK_API: "false"
          VITE_REPORT_BASE_URL: ${{ secrets.VITE_REPORT_BASE_URL }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        run: aws s3 sync frontend/dist s3://pawfiler-frontend --delete

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E2ZI7JFQGIUFYC --paths "/*"

  # 어드민 프론트엔드 S3 배포
  deploy-admin-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.admin_frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Build
        working-directory: admin-frontend
        env:
          VITE_ADMIN_API_URL: ${{ secrets.VITE_ADMIN_API_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          npm ci
          npm run build

      - name: Deploy to S3
        run: aws s3 sync admin-frontend/dist s3://pawfiler-admin-frontend --delete
