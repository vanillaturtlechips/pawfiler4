version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: pawfiler
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: pawfiler_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pawfiler"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  auth-service:
    build:
      context: ./backend/services/auth
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://pawfiler:testpass123@postgres:5432/pawfiler_db?sslmode=disable
      JWT_SECRET: test-jwt-secret-for-local-testing-only
      REDIS_ADDR: redis:6379
      PORT: "8084"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  community-service:
    build:
      context: ./backend/services/community
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://pawfiler:testpass123@postgres:5432/pawfiler_db?sslmode=disable
      PORT: "50053"
      HTTP_PORT: "8080"
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8080:8080"
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy

  user-service:
    build:
      context: ./backend/services/user
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://pawfiler:testpass123@postgres:5432/pawfiler_db?sslmode=disable
      CORS_ALLOWED_ORIGINS: "http://localhost:3000"
    ports:
      - "8083:8083"
      - "50054:50054"
    depends_on:
      postgres:
        condition: service_healthy
